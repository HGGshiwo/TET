version: '3.8'

services:
  unsloth:
    image: unsloth:grpo
    container_name: unsloth_dev
    restart: unless-stopped
    
    # 环境变量
    environment:
      - JUPYTER_PASSWORD=mypassword
    
    # 端口映射
    ports:
      - "8888:8888" # Jupyter
      - "2222:22"   # SSH
      - "6006:6006"
    
    # 挂载目录 (对应 $(pwd)/work)
    volumes:
      - ../../TET:/workspace/TET
      - D:\\datasets:/datasets
    # 关键：解决 PyTorch "Bus error" 问题
    # 允许容器使用宿主机的共享内存，这对于大模型训练至关重要
    ipc: host
    
    # GPU 配置
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all # 使用所有 GPU
              capabilities: [gpu]
